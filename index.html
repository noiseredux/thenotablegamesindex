<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Notable Games Index</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --success: #4ade80;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 2rem;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            margin-bottom: 2rem;
            border-bottom: 1px solid #334155;
            padding-bottom: 1rem;
        }
        .version-badge {
            background-color: var(--accent);
            color: var(--bg-color);
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.85rem;
        }
        .controls {
            margin-bottom: 2rem;
            display: flex;
            gap: 1rem;
        }
        select, button {
            background: var(--card-bg);
            color: var(--text-main);
            border: 1px solid #334155;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
        }
        button:hover {
            border-color: var(--accent);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1.5rem;
        }
        .card {
            background: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #334155;
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-4px);
        }
        .cover-placeholder {
            width: 100%;
            height: 280px;
            background: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
        }
        .cover-img {
            width: 100%;
            height: 280px;
            object-fit: cover;
        }
        .card-content {
            padding: 1rem;
        }
        .card-title {
            font-size: 1.1rem;
            font-weight: bold;
            margin: 0 0 0.5rem 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-meta {
            font-size: 0.9rem;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
        }
        .status {
            color: var(--success);
            font-weight: 500;
        }
        #loading {
            text-align: center;
            font-size: 1.2rem;
            color: var(--accent);
            margin: 2rem 0;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>The Notable Games Index <span class="version-badge">v5.0.7</span></h1>
        <p style="color: var(--text-muted);">Ecosystem-Aware Historical Chart Stream</p>
    </header>

    <div class="controls">
        <select id="yearSelect">
            <option value="2026">2026</option>
            <option value="2025">2025</option>
            <option value="2024">2024</option>
            <option value="1997">1997</option>
            <option value="1889">1989</option>
        </select>
        <button onclick="fetchData()">Load Index</button>
    </div>
