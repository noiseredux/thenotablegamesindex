<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Notable Games Index</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <style>
        :root {
            --ps-blue: #003087;
            --ps-blue-light: #0070cc;
            --nin-red: #e4000f;
            --bg: #f4f4f9;
            --text: #111118;
            --text-muted: #8888aa;
        }
        body { background-color: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-weight: 300; margin: 0; }
        .container { max-width: 1200px; margin: 0 auto; background: white; min-height: 100vh; box-shadow: 0 0 40px rgba(0,0,0,0.05); }
        header { background: linear-gradient(135deg, var(--ps-blue) 0%, #001a4d 100%); border-bottom: 4px solid var(--nin-red); padding: 3rem 1.5rem; text-align: center; }
        header h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(2.2rem, 7vw, 4.2rem); color: #fff; line-height: 0.9; text-transform: uppercase; margin: 0; }
        .version-tag { font-size: 0.8rem; letter-spacing: 0.3em; text-transform: uppercase; color: #ffffff; opacity: 0.8; margin-top: 0.75rem; font-weight: 500; }
        .controls { background: #e2e2ea; padding: 15px; display: flex; justify-content: center; align-items: center; gap: 15px; }
        .controls select { padding: 8px 20px; font-weight: 700; border: 2px solid var(--ps-blue); border-radius: 4px; color: var(--ps-blue); cursor: pointer; }
        .loading { text-align: center; padding: 80px; font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--ps-blue); }
        .games-grid { display: flex; flex-direction: column; gap: 12px; padding: 30px; max-width: 900px; margin: 0 auto; }
        .game-card { background: white; border: 1px solid #dcdce8; border-radius: 8px; display: flex; align-items: center; padding: 14px; gap: 20px; text-decoration: none; color: inherit; transition: all 0.2s ease; }
        .game-card:hover { transform: translateX(8px); border-color: var(--ps-blue-light); }
        .game-rank { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; color: var(--ps-blue); min-width: 65px; text-align: center; }
        .game-image-container { width: 70px; height: 94px; background: #eee; border-radius: 4px; overflow: hidden; flex-shrink: 0; }
        .game-image { width: 100%; height: 100%; object-fit: cover; }
        .game-title { font-weight: 700; font-size: 1.2rem; color: var(--text); }
        .engagement-value { color: var(--nin-red); font-weight: 700; }
        .platform-tag { background: #edf2f7; color: #4a5568; font-size: 0.65rem; padding: 3px 8px; border-radius: 4px; margin-right: 5px; text-transform: uppercase; font-weight: 700; border: 1px solid #cbd5e0; }
        footer { padding: 50px; text-align: center; color: var(--text-muted); font-size: 0.8rem; border-top: 1px solid #e2e2ea; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>The Notable Games Index</h1>
            <p class="version-tag">Version 6.1.8</p>
        </header>
        <div class="controls">
            <label>Select Year:</label>
            <select id="yearSelect"></select>
        </div>
        <div id="content"></div>
        <footer>
            Built by noiseredux &nbsp;·&nbsp; Data powered by IGDB <br>
            A curated record of cultural mindshare for the Sony, Nintendo, and Apple lineages.
        </footer>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby3_IE8KU_qeQ4JCgTnoaF1w--vPUemtxHjW5Aq3aF_cUN8eqmYny7xlAlbT-wMp4Qj/exec';

        const ALLOWED_PLATFORMS = [75, 14, 39, 18, 99, 19, 58, 4, 21, 5, 41, 130, 508, 33, 22, 24, 20, 37, 27, 53, 59, 68, 117, 78, 57, 123, 87, 7, 8, 9, 48, 167, 165, 38, 46, 51, 77, 121, 306];
        const PLATFORM_NAMES = { 75: 'Apple II', 14: 'Mac', 39: 'iOS', 18: 'NES', 99: 'Famicom', 19: 'SNES', 58: 'S.Famicom', 4: 'N64', 21: 'GameCube', 5: 'Wii', 41: 'Wii U', 130: 'Switch', 508: 'Switch 2', 33: 'GB', 22: 'GBC', 24: 'GBA', 20: 'DS', 37: '3DS', 27: 'MSX', 53: 'MSX2', 59: 'Atari 2600', 68: 'Coleco', 117: 'CDi', 78: 'Sega CD', 57: 'WS', 123: 'WSC', 87: 'VB', 7: 'PS1', 8: 'PS2', 9: 'PS3', 48: 'PS4', 167: 'PS5', 165: 'PSVR', 38: 'PSP', 46: 'Vita', 51: 'FDS', 77: 'X1', 121: 'X68k', 306: 'Satella' };

        // IGDB Category Blacklist: 1=DLC, 2=Expansion, 3=Bundle, 4=Standalone Expansion, 5=Mod, 6=Episode, 7=Season
        const BLACKLISTED_CATEGORIES = [1, 2, 3, 4, 5, 6, 7];

        // --- Minimum review threshold ---
        // v6.0.0: A game must have at least 7 combined user + critic reviews to qualify.
        // Prevents obscure or unreviewed titles from dominating on a perfect score
        // from a tiny sample, while remaining permissive enough not to punish older
        // or niche titles that simply didn't receive wide coverage.
        const MIN_COMBINED_REVIEWS = 7;

        // v6.1.7: Separate minimum critic review count. Digimon Story: Time Stranger
        // (18 user ratings, only 3 critic ratings) cleared the combined threshold
        // easily and, even with the confidence floor lowered to 0.25, still punched
        // into the top 15 of 2025 above Elden Ring Nightreign, Pokémon Legends Z-A,
        // and Monster Hunter Wilds. 3 critic reviews is too thin a sample for the
        // critic half of the 50/50 blend to carry real weight. This requires at
        // least 5 critic ratings specifically, on top of the combined minimum.
        // Kept separate from MIN_COMBINED_REVIEWS rather than raising it globally,
        // since older/retro titles often have stronger critic coverage than user
        // coverage and shouldn't be penalized on the combined count alone.
        const MIN_CRITIC_REVIEWS = 5;

        // --- Boost multipliers (all neutral at v6.0.0 launch) ---
        // Set any of these above 1.0 to apply a boost to that category.
        // Philosophy: correct the data's blind spots, not the games themselves.

        // v6.0.0: Sports genre boost. Sports titles on consoles skew toward audiences
        // that don't engage with IGDB, causing systematic underrepresentation in
        // review counts that drags down their confidence weight unfairly.
        // Set above 1.0 to correct for that floor.
        const GENRE_SPORT_ID = 14;
        // v6.1.2: Activated at 1.8x.
        // v6.1.3: Dropped to 1.2x — 1.8x was too broad, lifting niche sports titles
        // (Rematch, Sonic Racing, Inazuma Eleven) that don't need the correction.
        // A gentle 1.2x nudge for the genre broadly without overwhelming the list.
        const SPORT_MULTIPLIER = 1.2;

        // v6.0.0: Major league sports franchises (Madden, MLB The Show, NHL, NASCAR,
        // etc.) suffer the sports problem more acutely than general sports titles.
        // FC/FIFA and NBA 2K are intentionally excluded — their IGDB engagement
        // already reflects real-world mindshare reasonably well.
        // Applied after SPORT_MULTIPLIER; effective total = SPORT × MAJOR_LEAGUE.
        const MAJOR_LEAGUE_TITLE_SLUGS = [
            'madden',
            'mlb-the-show',
            'nhl-',
            'nascar',
            'ea-sports-college-football',
            'pga-tour-2k'
        ];
        // v6.1.2: Activated at 1.4x.
        // v6.1.3: Dropped to 1.3x — stacks on SPORT_MULTIPLIER for Madden/NFL/NASCAR
        // tier. Effective total with sport: 1.2 × 1.6 × 1.3 = ~2.5x (down from 4.0x).
        const MAJOR_LEAGUE_MULTIPLIER = 1.3;

        // v6.0.0: Mainstream franchises (COD, etc.) with massive console audiences
        // whose players skew away from IGDB engagement. Gentler correction than the
        // major league sports tier — these titles do appear in the data, they're just
        // chronically underweighted relative to their true cultural penetration.
        const MAINSTREAM_TITLE_SLUGS = [
            'call-of-duty',
            'madden'
        ];
        // v6.1.2: Activated at 1.6x. COD/Madden have massive console audiences
        // whose players skew heavily away from IGDB engagement. COD Black Ops 6
        // sitting at #41 when it should be #12-15; Madden at #228 when it should
        // be #20-25. Stacks on top of SPORT_MULTIPLIER for Madden.
        const MAINSTREAM_MULTIPLIER = 1.6;

        // v6.0.0: Nintendo + Sony affiliated publisher boost.
        // This site concentrates on the Nintendo/Sony lineages, so it is intentional
        // and transparent that those publishers receive a mild lift to reflect the
        // editorial focus. Set above 1.0 when calibration warrants it.
        //
        // Nintendo lineage: HAL, Game Freak, Hudson (first NES third party,
        // co-developed HuCARD), Rare (pre-Xbox), Intelligent Systems, Monolith Soft,
        // Retro, etc.
        //
        // Sony lineage: Psygnosis (published ~half of Sony's Sega CD catalog and was
        // acquired during that era), Polyphony, Naughty Dog, Insomniac, Guerrilla,
        // CSG/Sony Imagesoft (the early US publishing arm), and all current
        // PlayStation Studios subsidiaries.
        const AFFILIATED_PUBLISHERS = [
            // Nintendo lineage
            'nintendo',
            'hal laboratory',
            'hal america',
            'game freak',
            'monolith soft',
            'retro studios',
            'intelligent systems',
            'creatures inc',
            'nd cube',
            'grezzo',
            'camelot',
            'alphadream',
            'brownie brown',
            '1-up studio',
            'jupiter corporation',
            'ambrella',
            'skip ltd',
            'rare',
            'rareware',
            'hudson soft',
            'hudson entertainment',
            'ape inc',

            // Sony lineage
            'sony',
            'csg imagesoft',
            'sony imagesoft',
            'psygnosis',
            'studio liverpool',
            'guerrilla games',
            'naughty dog',
            'insomniac games',
            'sucker punch',
            'media molecule',
            'evolution studios',
            'polyphony digital',
            'japan studio',
            'team asobi',
            'bend studio',
            'san diego studio',
            'zipper interactive',
            'bigbig studios',
            'ready at dawn',
            'firesprite',
            'housemarque',
            'bluepoint games',
            'nixxes software',
            'bungie'
        ];
        // v6.1.0: Activated at 1.5x. Nintendo/Sony affiliated titles are the editorial
        // focus of this index, and their IGDB engagement systematically underrepresents
        // their cultural weight on those platforms. Starting conservative — tune upward
        // if Marathon/Pokémon/etc. still feel too low after the confidence floor fix.
        const AFFILIATED_MULTIPLIER = 1.5;

        // v6.0.0: Namco-specific boost, separate from the general affiliated list.
        // Namco's relationship with Sony is uniquely deep — the PS1 hardware was
        // essentially built around Namco's System 22 arcade board; Ridge Racer and
        // Tekken defined the PS1 launch; Sony published Namco titles in Western
        // territories. Namco was never owned by Sony, so it sits in its own tier:
        // above general third parties but handled separately from core first-party.
        // When active, effective total = AFFILIATED × NAMCO.
        const NAMCO_PUBLISHERS = ['namco', 'bandai namco'];
        // v6.1.0: Activated at 1.3x (effective total with affiliated: 1.95x).
        // v6.1.1: Raised to 1.6x (effective total with affiliated: 2.4x) after
        // calibration against 2026 data showed Namco titles (e.g. Directive 8020)
        // sitting ~3 positions too low. The extra headroom better reflects Namco's
        // tier above general third parties without crowding out pure first-party titles.
        // v6.1.6: Dropped to 1.4x. At 1.6x, Namco's multiplier exceeded Affiliated's
        // 1.5x, which structurally inverted the intended hierarchy — a Namco title
        // (Dragon Ball Gekishin Squadra, 80.8) outranked a core Nintendo first-party
        // title (Metroid Prime 4: Beyond, 80.1) purely because Namco's multiplier was
        // larger, regardless of underlying merit. Namco must sit below Affiliated as
        // a structural guarantee, not something that happens to work out per game.
        // v6.1.8: Raised to 1.45x. Closer to Affiliated's 1.5x to reflect Namco's
        // strong Sony partnership, while deliberately staying just below it so the
        // tier-ordering guarantee from v6.1.6 holds — Namco can approach but not
        // tie or exceed core first-party in any head-to-head.
        const NAMCO_MULTIPLIER = 1.45;

        // v6.1.5: Critical darling bump. Genuinely exceptional non-affiliated titles
        // (Metaphor: ReFantazio, Clair Obscur: Expedition 33) were getting buried
        // by the affiliated boost ceiling despite universal critical acclaim. Rather
        // than softening the affiliated multiplier (which would affect every game,
        // every year), this is a targeted, narrow rule: if a game's raw composite
        // score (before any multiplier, including confidence weight) clears the
        // threshold, it gets a one-time bump. Fires independently of publisher, so
        // an affiliated title that also clears the threshold gets both boosts —
        // intentional, since that combination represents genuinely exceptional
        // first-party work.
        const CRITICAL_DARLING_THRESHOLD = 85;
        const CRITICAL_DARLING_MULTIPLIER = 1.3;

        // --- Scoring engine ---

        // v6.0.0: Confidence-weighted composite score.
        //
        // rawScore = (userScore × 0.5) + (criticScore × 0.5)
        //   — 50/50 split; adjust weights here if calibration suggests otherwise.
        //   — If only one source exists, it carries full weight.
        //   — Returns null if neither source is present.
        //
        // confidenceWeight = log(totalReviews + 1) / log(maxReviews + 1)
        //   — Normalises to 0–1 relative to the most-reviewed game in the current set.
        //   — Log scaling softens the curve so mid-tier review counts aren't
        //     unfairly crushed against titles with orders-of-magnitude more reviews.
        //
        // finalScore = rawScore × confidenceWeight × [applicable multipliers]
        //   — Multipliers stack multiplicatively in the order: sport → major league
        //     → mainstream → affiliated → namco.
        //   — All multipliers default to 1.0 (neutral) at launch.

        const USER_WEIGHT   = 0.5;
        const CRITIC_WEIGHT = 0.5;

        function computeRawScore(game) {
            const hasUser   = game.rating   !== null && game.rating_count   > 0;
            const hasCritic = game.aggregated_rating !== null && game.aggregated_rating_count > 0;
            if (!hasUser && !hasCritic) return null;
            if (hasUser && hasCritic) return (game.rating * USER_WEIGHT) + (game.aggregated_rating * CRITIC_WEIGHT);
            if (hasUser)   return game.rating;
            return game.aggregated_rating;
        }

        // v6.1.0: Added a floor of 0.4 to the confidence curve so that even a game
        // sitting at the minimum review threshold (7 combined) still contributes 40%
        // of its raw score to the final result. Without the floor, low-review-count
        // titles with genuinely high scores (Marathon, Pokémon) were being crushed
        // relative to mid-tier games that happened to accumulate more IGDB activity.
        // The log curve then lifts confidence toward 1.0 as review counts grow,
        // preserving the relative reward for well-reviewed titles.
        // v6.1.5: Dropped to 0.25. 0.4 was letting thin-sample flukes (Digimon Story:
        // Time Stranger — 18 user ratings, 3 critic ratings — sitting at 9.2/8.3)
        // punch above games with real review volume. Cannot raise MIN_COMBINED_REVIEWS
        // to compensate since that would exclude legitimate pre-90s titles with
        // naturally low IGDB coverage. A lower floor still protects Marathon/Pokémon-
        // tier titles (moderate samples, genuinely high scores) while giving less
        // benefit of the doubt to titles barely clearing the minimum threshold.
        const CONFIDENCE_FLOOR = 0.25;

        function computeConfidenceWeight(game, maxReviews) {
            const total = (game.rating_count || 0) + (game.aggregated_rating_count || 0);
            if (maxReviews <= 0) return 0;
            const logWeight = Math.log(total + 1) / Math.log(maxReviews + 1);
            return CONFIDENCE_FLOOR + (1 - CONFIDENCE_FLOOR) * logWeight;
        }

        function isMainstreamTitle(game) {
            if (!game.slug) return false;
            return MAINSTREAM_TITLE_SLUGS.some(kw => game.slug.includes(kw));
        }

        function isMajorLeagueTitle(game) {
            if (!game.slug) return false;
            return MAJOR_LEAGUE_TITLE_SLUGS.some(kw => game.slug.includes(kw));
        }

        function isNamcoTitle(game) {
            if (!game.publishers) return false;
            return game.publishers.some(pub => NAMCO_PUBLISHERS.some(n => pub.toLowerCase().includes(n)));
        }

        function isAffiliatedPublisher(game) {
            if (!game.publishers) return false;
            return game.publishers.some(pub => AFFILIATED_PUBLISHERS.some(aff => pub.toLowerCase().includes(aff)));
        }

        function displayGames(gamesList) {
            const content = document.getElementById('content');

            // Platform and category filter
            // v6.1.4: Exclude iOS-only titles. iOS (39) is in the allowed list for
            // games that appear on iOS AND a console, but mobile-only titles
            // (e.g. Gakuen Idolmaster) were floating too high on thin IGDB data.
            // If a game's only allowed platform is iOS, it is excluded entirely.
            let filtered = gamesList.filter(game => {
                const allowedOnGame = game.platforms.filter(id => ALLOWED_PLATFORMS.includes(id));
                const isCorrectPlatform = allowedOnGame.length > 0;
                const isIOSOnly = allowedOnGame.length === 1 && allowedOnGame[0] === 39;
                const isBlacklistedCategory = game.category && BLACKLISTED_CATEGORIES.includes(game.category);
                return isCorrectPlatform && !isIOSOnly && !isBlacklistedCategory;
            });

            // Minimum combined review threshold
            filtered = filtered.filter(game => {
                const total = (game.rating_count || 0) + (game.aggregated_rating_count || 0);
                return total >= MIN_COMBINED_REVIEWS;
            });

            // v6.1.7: Minimum critic review threshold. If a game has any critic
            // rating at all but fewer than MIN_CRITIC_REVIEWS, that critic score is
            // too thin a sample to trust — it's dropped from the game object so
            // computeRawScore falls back to user score only. Games with zero critic
            // ratings are unaffected; this only discounts thin, low-confidence
            // critic samples like Digimon's 3 critic reviews.
            filtered.forEach(game => {
                if (game.aggregated_rating_count > 0 && game.aggregated_rating_count < MIN_CRITIC_REVIEWS) {
                    game.aggregated_rating = null;
                    game.aggregated_rating_count = 0;
                }
            });

            // Determine max combined review count for confidence normalisation
            const maxReviews = filtered.reduce((max, game) => {
                const total = (game.rating_count || 0) + (game.aggregated_rating_count || 0);
                return Math.max(max, total);
            }, 0);

            // Score each game
            filtered.forEach(game => {
                const rawScore = computeRawScore(game);
                if (rawScore === null) { game.final_score = 0; return; }

                const confidence = computeConfidenceWeight(game, maxReviews);
                let score = rawScore * confidence;

                // v6.1.5: Critical darling bump fires first, based on raw score
                // (pre-confidence, pre-multiplier) so it only catches genuinely
                // exceptional ratings, not games that merely accumulated volume.
                if (rawScore >= CRITICAL_DARLING_THRESHOLD) {
                    score *= CRITICAL_DARLING_MULTIPLIER;
                }

                // Multipliers — stack multiplicatively
                if (game.genres && game.genres.includes(GENRE_SPORT_ID)) {
                    score *= SPORT_MULTIPLIER;
                }
                if (isMajorLeagueTitle(game)) {
                    score *= MAJOR_LEAGUE_MULTIPLIER;
                }
                if (isMainstreamTitle(game)) {
                    score *= MAINSTREAM_MULTIPLIER;
                }
                // v6.1.4: Major league titles (MLB, Madden, NHL etc.) skip the
                // affiliated multiplier. MLB The Show is published by Sony San Diego
                // and was catching SPORT + MAJOR_LEAGUE + AFFILIATED all at once,
                // pushing it to #2 in 2024 above Astro Bot and Helldivers 2.
                // Sports franchises should be corrected for IGDB underrepresentation,
                // not treated as editorially prioritised first-party titles.
                if (isAffiliatedPublisher(game) && !isMajorLeagueTitle(game)) {
                    score *= AFFILIATED_MULTIPLIER;
                }
                if (isNamcoTitle(game)) {
                    score *= NAMCO_MULTIPLIER;
                }

                game.final_score = score;
            });

            // Drop games with no scoreable data
            filtered = filtered.filter(game => game.final_score > 0);
            filtered.sort((a, b) => b.final_score - a.final_score);

            if (!filtered.length) {
                content.innerHTML = '<div class="loading">No records found for this year.</div>';
                return;
            }

            const grid = document.createElement('div');
            grid.className = 'games-grid';

            filtered.forEach((game, index) => {
                const card = document.createElement('a');
                card.className = 'game-card';
                card.href = `https://www.igdb.com/games/${game.slug}`;
                card.target = '_blank';
                const coverUrl = game.cover
                    ? `https://images.igdb.com/igdb/image/upload/t_cover_small/${game.cover}.jpg`
                    : '';

                // Display score as a 0–100 value rounded to one decimal
                const displayScore = game.final_score.toFixed(1);

                card.innerHTML = `
                    <div class="game-rank">#${index + 1}</div>
                    <div class="game-image-container">${game.cover ? `<img class="game-image" src="${coverUrl}" alt="${game.name} cover">` : ''}</div>
                    <div class="game-info">
                        <div class="game-title">${game.name}</div>
                        <div style="font-size:0.85rem; color:var(--text-muted); text-transform:uppercase;">
                            Score: <span class="engagement-value">${displayScore}</span>
                        </div>
                        <div style="margin-top: 4px;">
                            ${game.platforms.filter(id => ALLOWED_PLATFORMS.includes(id)).map(id => `<span class="platform-tag">${PLATFORM_NAMES[id] || id}</span>`).join('')}
                        </div>
                    </div>`;
                grid.appendChild(card);
            });

            content.innerHTML = '';
            content.appendChild(grid);
        }

        function populateYearDropdown() {
            const select = document.getElementById('yearSelect');
            for (let year = 2026; year >= 1977; year--) {
                const opt = document.createElement('option');
                opt.value = year; opt.textContent = year;
                select.appendChild(opt);
            }
        }

        async function loadGames(year) {
            const content = document.getElementById('content');
            content.innerHTML = '<div class="loading">Loading Index...</div>';
            try {
                const response = await fetch(`${GOOGLE_SCRIPT_URL}?year=${year}&_cb=${Date.now()}`);
                const data = await response.json();
                displayGames(data.games || []);
            } catch (e) {
                console.error(e);
                content.innerHTML = `<div class="loading" style="color:red">System Connection Error.</div>`;
            }
        }

        populateYearDropdown();
        document.getElementById('yearSelect').addEventListener('change', e => loadGames(e.target.value));
        loadGames(2026);
    </script>
</body>
</html>
